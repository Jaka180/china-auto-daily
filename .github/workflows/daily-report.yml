name: 中国车企出海日报（每日邮件）

on:
  schedule:
    # 22:20 UTC = 北京时间次日 06:20
    - cron: "20 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          pip install -r server/requirements.txt

      - name: 安装中文字体（封面用，失败不影响后续步骤）
        continue-on-error: true
        run: sudo apt-get update -y && sudo apt-get install -y fonts-noto-cjk

      - name: 生成日报正文
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
        run: python3 server/generate.py

      - name: 生成封面
        continue-on-error: true
        run: python3 tools/make_cover.py --date "$(date +%F)" --out content/cover.jpg

      - name: 发送邮件
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python3 server/send_email.py

      - name: 归档当日内容回仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/
          git diff --cached --quiet || git commit -m "chore: 日报归档 $(date +%F)"
          git push
